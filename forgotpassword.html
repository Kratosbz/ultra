<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body {background:#0b0f12;color:#fff;}
.risk-bar {background:#000;color:#9aa4af;font-size:13px;text-align:center;padding:10px 20px;}
.header {display:flex;justify-content:space-between;align-items:center;padding:25px 50px;}
.logo {font-size:28px;font-weight:600;color:#18e09b;}
.lang {font-size:14px;color:#ccc;}
.wrapper {height:calc(100vh - 140px);display:flex;justify-content:center;align-items:center;}
.card {width:460px;background:#0f1418;border:1px solid #1f2a30;border-radius:20px;padding:40px;}
.card h2 {text-align:center;font-weight:600;margin-bottom:15px;}
.card p.subtitle {text-align:center;color:#9aa4af;font-size:14px;margin-bottom:30px;}
label {font-size:14px;color:#9aa4af;}
input {width:100%;margin-top:8px;margin-bottom:20px;padding:14px;background:#11161a;border:1px solid #2a363d;border-radius:10px;color:#fff;font-size:14px;}
button.primary {width:100%;padding:14px;border-radius:10px;border:none;background:#18e09b;font-weight:600;cursor:pointer;transition:0.3s;}
button.primary:hover {background:#12c884;}
.live-section {display:none;font-size:13px;padding:10px;border-radius:8px;margin-bottom:15px;}
.alert-primary {background:#1c2d26;color:#18e09b;}
.alert-danger {background:#2d1c1c;color:#ff6b6b;}
@media(max-width:600px){.card{width:90%;padding:30px;}}
</style>
</head>

<body>

<div class="risk-bar">
CFDs are complex instruments and come with a high risk of losing money rapidly due to leverage.
</div>

<div class="header">
    <div class="logo">X</div>
    <div class="lang">🌐 EN</div>
</div>

<div class="wrapper">

<div class="card">
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your registered email to receive a reset link</p>

    <form id="forgot-password-form">
        <div id="statusBox" class="live-section"></div>

        <label>Email</label>
        <input type="email" id="email" placeholder="example@email.com" required>

        <button class="primary" id="registerBtn" type="submit">
            Send Reset Link
        </button>
    </form>
</div>

</div>

<footer style="text-align:center;padding:20px 0;background:#0b0f12;color:#888;font-size:13px;margin-top:30px;">
    © 2026 X Platform. All rights reserved. | 
    <span style="color:#18e09b;cursor:pointer;">Privacy Policy</span> | 
    <span style="color:#18e09b;cursor:pointer;">Terms of Service</span>
</footer>

<script>
const btn = document.getElementById('registerBtn');
const statusBox = document.getElementById('statusBox');

function red() {
  btn.style.opacity = "1";
  btn.innerHTML = "Send Reset Link";
  btn.disabled = false;
}

function blurr() {
  btn.style.opacity = "0.6";
  btn.innerHTML = "Processing...";
  btn.disabled = true;
}

async function resendEmail(values) {
  await $.ajax({
    type: "POST",
    url: "https://smartgen-render.onrender.com/auth/register/resend",
    dataType: "json",
    data: { ...values },
    timeout: 30000,
    success: function () {
      Swal.fire("Success", "A reset link has been sent to your email.", "success");

      statusBox.className = "live-section alert-primary";
      statusBox.style.display = "block";
      statusBox.innerText = "A reset link has been sent to your email.";

      setTimeout(function () {
        window.location.href = './passwordotp.html';
      }, 3000);
    },
    error: function () {
      red();
      Swal.fire("Error", "User does not exist or email is invalid.", "error");

      statusBox.className = "live-section alert-danger";
      statusBox.style.display = "block";
      statusBox.innerText = "User does not exist or email is invalid.";
    }
  });
}

$('#forgot-password-form').on('submit', function (e) {
  e.preventDefault();
  blurr();

  const email = document.getElementById('email').value.trim();
  localStorage.setItem("email", email);

  resendEmail({ email });
});
</script>
