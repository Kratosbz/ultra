<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GeoPhoto System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 1rem;
      background: #020617;
      border-bottom: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .upload-btn {
      background: #22c55e;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    #map {
      height: 60vh;
      width: 100%;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      padding: 1rem;
    }

    .card {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .meta {
      padding: 0.5rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<header>
  <h2>📍 GeoPhoto</h2>
  <label class="upload-btn">
    Upload Image
    <input type="file" id="upload" hidden multiple>
  </label>
</header>

<div id="map"></div>

<div class="gallery" id="gallery"></div>

<!-- Libraries -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<script>
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let photos = [];

document.getElementById('upload').addEventListener('change', handleUpload);

function handleUpload(e) {
  const files = Array.from(e.target.files);

  files.forEach(file => {
    const reader = new FileReader();

    reader.onload = function(event) {
      const img = new Image();
      img.src = event.target.result;

      img.onload = function() {
        EXIF.getData(img, function() {
          let lat = EXIF.getTag(this, "GPSLatitude");
          let lon = EXIF.getTag(this, "GPSLongitude");

          if (lat && lon) {
            lat = convertToDecimal(lat);
            lon = convertToDecimal(lon);
            savePhoto(file, event.target.result, lat, lon);
          } else {
            // fallback to browser location
            navigator.geolocation.getCurrentPosition(pos => {
              savePhoto(
                file,
                event.target.result,
                pos.coords.latitude,
                pos.coords.longitude
              );
            });
          }
        });
      };
    };

    reader.readAsDataURL(file);
  });
}

function convertToDecimal(coord) {
  return coord[0] + coord[1]/60 + coord[2]/3600;
}

function savePhoto(file, src, lat, lon) {
  const photo = {
    src,
    lat,
    lon,
    date: new Date()
  };

  photos.push(photo);

  addToMap(photo);
  renderGallery();
}

function addToMap(photo) {
  const marker = L.marker([photo.lat, photo.lon]).addTo(map);

  marker.bindPopup(`
    <img src="${photo.src}" width="120"><br/>
    ${photo.lat.toFixed(3)}, ${photo.lon.toFixed(3)}
  `);

  map.setView([photo.lat, photo.lon], 10);
}

function renderGallery() {
  const gallery = document.getElementById('gallery');

  // sort by newest
  photos.sort((a, b) => b.date - a.date);

  gallery.innerHTML = photos.map(p => `
    <div class="card">
      <img src="${p.src}">
      <div class="meta">
        📍 ${p.lat.toFixed(2)}, ${p.lon.toFixed(2)}<br/>
        🕒 ${p.date.toLocaleString()}
      </div>
    </div>
  `).join('');
}
</script>

</body>
</html>
